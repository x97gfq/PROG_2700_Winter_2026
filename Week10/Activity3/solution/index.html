<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Activity 3 — Job Postings (Solution)</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 820px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h1 { color: #222; }

        h2 {
            color: #222;
            border-bottom: 2px solid #eee;
            padding-bottom: 6px;
            margin-top: 2rem;
        }

        .job {
            background: #f7f9fc;
            border: 1px solid #dce3ec;
            border-radius: 6px;
            padding: 12px 16px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .job-left h3 { margin: 0 0 3px; color: #003; }
        .job-left p  { margin: 2px 0; color: #555; font-size: 0.88rem; }

        .job-right {
            text-align: right;
            font-size: 0.85rem;
            color: #666;
            white-space: nowrap;
        }

        .job-right .salary {
            font-size: 1rem;
            font-weight: bold;
            color: #007744;
        }

        .badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 10px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-dev    { background: #dbeafe; color: #1d4ed8; }
        .badge-design { background: #fce4ff; color: #8b00b5; }
        .badge-data   { background: #dcfce7; color: #15803d; }

        .stats {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 2rem;
        }

        .stat .num { font-size: 1.5rem; font-weight: bold; color: #0077cc; }
        .stat .lbl { font-size: 0.82rem; color: #666; }
    </style>
</head>

<body>
    <h1>Job Postings</h1>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/lodash/lodash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs/plugin/relativeTime.js"></script>
    <script src="app.js"></script>
</body>

</html>
