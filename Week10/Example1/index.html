<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Week 10 — Example 1: ES6+ Features</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 24px;
        }

        h1 {
            font-family: sans-serif;
            color: #569cd6;
            margin-bottom: 0.25rem;
        }

        h2 {
            font-family: sans-serif;
            color: #4ec9b0;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
            margin: 2rem 0 0.5rem;
        }

        .entry {
            background: #252526;
            border-left: 3px solid #569cd6;
            padding: 10px 14px;
            margin: 5px 0;
            border-radius: 0 4px 4px 0;
        }

        .comment {
            color: #6a9955;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .label {
            color: #9cdcfe;
        }

        .value {
            color: #ce9178;
        }
    </style>
</head>

<body>
    <h1>ES6+ Features</h1>
    <div id="output"></div>
    <script src="app.js"></script>
</body>

</html>
