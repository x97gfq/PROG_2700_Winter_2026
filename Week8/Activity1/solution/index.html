<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Activity 1 - Pokemon CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>Pokemon Manager</h1>
            <button class="btn btn-success" onclick="openAddModal()">+ Add Pokemon</button>
        </div>

        <table class="table table-striped table-bordered bg-white">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>HP</th>
                    <th>Attack</th>
                    <th>Defense</th>
                    <th>Speed</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="pokemon-table-body">
                <tr>
                    <td colspan="8" class="text-center">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- View / Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Pokemon Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-id">
                    <div class="mb-2"><label class="form-label">Name</label>
                        <input type="text" class="form-control" id="edit-name">
                    </div>
                    <div class="mb-2"><label class="form-label">Type</label>
                        <input type="text" class="form-control" id="edit-type">
                    </div>
                    <div class="row">
                        <div class="col mb-2"><label class="form-label">HP</label>
                            <input type="number" class="form-control" id="edit-hp">
                        </div>
                        <div class="col mb-2"><label class="form-label">Attack</label>
                            <input type="number" class="form-control" id="edit-attack">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col mb-2"><label class="form-label">Defense</label>
                            <input type="number" class="form-control" id="edit-defense">
                        </div>
                        <div class="col mb-2"><label class="form-label">Speed</label>
                            <input type="number" class="form-control" id="edit-speed">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-danger me-auto" onclick="deletePokemon()">Delete</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="savePokemon()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add New Modal -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Pokemon</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-2"><label class="form-label">Name</label>
                        <input type="text" class="form-control" id="add-name">
                    </div>
                    <div class="mb-2"><label class="form-label">Type</label>
                        <input type="text" class="form-control" id="add-type">
                    </div>
                    <div class="row">
                        <div class="col mb-2"><label class="form-label">HP</label>
                            <input type="number" class="form-control" id="add-hp">
                        </div>
                        <div class="col mb-2"><label class="form-label">Attack</label>
                            <input type="number" class="form-control" id="add-attack">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col mb-2"><label class="form-label">Defense</label>
                            <input type="number" class="form-control" id="add-defense">
                        </div>
                        <div class="col mb-2"><label class="form-label">Speed</label>
                            <input type="number" class="form-control" id="add-speed">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-success" onclick="addPokemon()">Add Pokemon</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
