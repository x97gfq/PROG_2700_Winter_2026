<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Activity 2 - Map + Chart (Solution)</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #1a73e8;
            color: white;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        header span {
            font-weight: normal;
            font-size: 0.9rem;
            opacity: 0.85;
            margin-left: 12px;
        }

        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #map {
            flex: 1;
        }

        #chart-panel {
            width: 420px;
            padding: 20px;
            background: #f8f8f8;
            border-left: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        #chart-panel h2 {
            margin: 0 0 12px;
            font-size: 1rem;
            color: #333;
        }

        #chart-panel canvas {
            flex: 1;
        }
    </style>
</head>

<body>
    <header>
        Activity 2 — Solution
        <span>Red = pop > 10M • Chart shows Area</span>
    </header>
    <div id="main">
        <div id="map"></div>
        <div id="chart-panel">
            <h2 id="chart-title">Top 10 by Area (km²)</h2>
            <canvas id="popChart"></canvas>
        </div>
    </div>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap" async
        defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>

</html>
