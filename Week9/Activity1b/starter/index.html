<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Activity 1b — Capital City Weather</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        #title {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 8px 18px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            font-size: 1.1rem;
            font-weight: bold;
            z-index: 10;
        }

        #loading {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            z-index: 10;
            display: none;
        }
    </style>
</head>

<body>
    <div id="title">European Capitals — Current Weather</div>
    <div id="loading">Fetching weather data...</div>
    <div id="map"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap"
        async defer></script>
    <script src="app.js"></script>
</body>

</html>
